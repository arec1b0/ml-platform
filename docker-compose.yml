services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    ports: ["5000:5000"]
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlartifacts
    volumes:
      - mlflow-data:/mlartifacts

  toxicity:
    build: ./models/toxicity
    ports: ["8081:8080"]
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: toxicity-classifier
      MODEL_STAGE: Production
    depends_on: [mlflow]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  ranker:
    build: ./models/ranker
    ports: ["8082:8080"]
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: comment-ranker
      MODEL_STAGE: Production
    depends_on: [mlflow]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  gateway:
    build: ./gateway
    ports: ["8000:8000"]
    environment:
      TOXICITY_URL: http://toxicity:8080
      RANKER_URL: http://ranker:8080
      OTEL_ENDPOINT: http://otel-collector:4317
      SERVICE_NAME: ml-gateway
    volumes:
      - reports-data:/app/reports
    depends_on:
      toxicity:
        condition: service_healthy
      ranker:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.97.0
    ports: ["4317:4317", "4318:4318"]
    volumes:
      - ./infra/otel/collector.yaml:/etc/otel/config.yaml
    command: ["--config=/etc/otel/config.yaml"]

  prometheus:
    image: prom/prometheus:v2.51.0
    ports: ["9090:9090"]
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  airflow:
    build: ./airflow
    ports: ["8085:8080"]
    environment:
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
    command: standalone
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - reports-data:/opt/airflow/reports

  pushgateway:
    image: prom/pushgateway:v1.8.0
    ports: ["9091:9091"]

volumes:
  mlflow-data:
  reports-data: