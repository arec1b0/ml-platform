global:
  scrape_interval: 15s

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:8000"]
    metrics_path: /metrics

  - job_name: toxicity
    static_configs:
      - targets: ["toxicity:8080"]
    metrics_path: /metrics

  - job_name: ranker
    static_configs:
      - targets: ["ranker:8080"]
    metrics_path: /metrics

  - job_name: pushgateway
    static_configs:
      - targets: ["pushgateway:9091"]